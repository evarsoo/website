<!DOCTYPE html>
<html>
<head>
    <title>Viaan Website</title>

    <style>
        body {
            font-family: Arial;
            background-color: black;
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        h1 {
            color: red;
            font-size: 40px;
        }

        button {
            background-color: red;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }

        #scaryImage {
            display: none;
            margin-top: 30px;
            width: 350px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <h1>Welcome to Viaan Website ❤️</h1>

    <p>Click the button if you dare...</p>

    <button onclick="showScaryImage()">
        Click Me
    </button>

    <br>

    <img
        id="scaryImage"
        src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1200&auto=format&fit=crop"
        alt="Scary Image"
    >

    <script>
        function showScaryImage() {
            document.getElementById("scaryImage").style.display = "block";
        }
    </script>

</body>
</html>
